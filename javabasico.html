<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuizCine - Oficial</title>
    <style>
        /* Variáveis de Cores */
        :root {
            --header-bg: #808080; /* Cinza do seu desenho */
            --logo-color: #ff0000; /* Vermelho do seu desenho */
            --body-bg: #ffffff;
            --btn-color: #000000;
        }

        .dark-mode {
            --body-bg: #121212;
            --btn-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--body-bg);
            transition: 0.3s;
        }

        /* Cabeçalho Cinza conforme o desenho */
        header {
            background-color: var(--header-bg);
            padding: 20px 40px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            color: var(--logo-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Seção Principal */
        .container {
            display: flex;
            padding: 40px;
            gap: 30px;
            align-items: flex-start;
        }

        /* Imagem (Cartaz) à esquerda */
        .cartaz-box {
            border: 3px solid #000;
            padding: 5px;
            background: white;
        }

        .cartaz-box img {
            width: 250px;
            display: block;
        }

        /* Área de Botões à direita da imagem */
        .content-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            border: 2px solid #000;
            background: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            color: var(--btn-color);
            transition: 0.2s;
        }

        button:hover {
            background-color: #ddd;
        }

        button a {
            text-decoration: none;
            color: inherit;
        }

        /* Sinopse e Informações */
        .info-text {
            color: var(--btn-color);
            max-width: 500px;
        }

        /* Rodapé */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 15px;
            background: #eee;
            color: #333;
            border-top: 2px solid #ccc;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LUIZCINE</div>
    </header>

    <main class="container">
        <div class="cartaz-box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTUPCWrIu7tQypL5VCO-L3vzgBKHTQS8ORgyA&s" alt="Logo Vasco">
        </div>

        <div class="content-right">
            <div class="nav-buttons">
                <button><a href="https://youtube.com">INÍCIO</a></button>
                <button><a href="https://youtube.com">HISTÓRICO</a></button>
                <button><a href="https://youtube.com">FILMES</a></button>
                <button><a href="https://youtube.com">CONTA</a></button>
                <button onclick="document.body.classList.toggle('dark-mode')">TEMA 🌓</button>
            </div>

            <div class="info-text">
                <h2>Sinopse do Filme</h2>
                <p>Aqui você pode colocar a descrição do conteúdo. Todos os botões acima levam diretamente para o YouTube conforme solicitado.</p>
                <button style="background-color: var(--logo-color); border: none;"><a href="https://youtube.com" style="color: white;">ASSISTIR TRAILER</a></button>
            </div>
        </div>
    </main>

    <footer>
        LuizCine &copy; 2026 - O seu portal de entretenimento.
    </footer>

</body>
</html>
